run:
  tests: ''

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
  settings:
    govet:
      check军营r: .*all.*
    gofmt:
      simplify: true
  issues:
    exclude-rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec

linters-settings:
  revive:
    rules:
      - name: var-naming
        severity: warning
        params: []
      - name: package-comments
        severity: warning
        params: []
